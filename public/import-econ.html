<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z考研 - 题库导入</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .info { background: #e8f4fd; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 12px; }
    .btn-primary { background: #1989fa; color: #fff; }
    .btn-danger { background: #ee0a24; color: #fff; }
    .btn:disabled { background: #ccc; }
    .log { background: #f5f5f5; padding: 12px; border-radius: 8px; font-size: 12px; max-height: 300px; overflow-y: auto; margin-top: 16px; }
    .log p { margin: 4px 0; }
    .ok { color: #07c160; }
    .err { color: #ee0a24; }
    .progress { height: 8px; background: #e5e5e5; border-radius: 4px; overflow: hidden; margin: 12px 0; }
    .bar { height: 100%; background: #1989fa; transition: width 0.3s; width: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 微观经济学题库导入</h1>
    <div class="info">
      将导入 <b>175 道</b>微观经济学题目（来自 Word 文档），替换原有 15 道。<br>
      请确保已用 <b>19126971307</b> 登录管理后台。
    </div>
    <button class="btn btn-danger" id="btnStart" onclick="startImport()">🚀 开始导入</button>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div id="status" style="font-size:14px;color:#666;"></div>
    <div class="log" id="log"></div>
  </div>

<script>
const API = 'https://zkaoyan-app.pages.dev/api/v1/admin';
let token = '';

function log(msg, cls='') {
  const d = document.createElement('p');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  document.getElementById('log').appendChild(d);
  d.scrollIntoView();
}

async function startImport() {
  token = localStorage.getItem('zky_token');
  if (!token) { log('❌ 请先登录 zkaoyan-app.pages.dev', 'err'); return; }

  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  btn.textContent = '⏳ 导入中...';

  // Step 1: Delete old questions
  log('🗑️ 正在删除旧题目...');
  try {
    await fetch(`${API}/questions_batch_delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ prefix: 'q_econ_' })
    });
  } catch(e) {}
  log('✅ 旧题目已处理');

  // Step 2: Load questions from server
  log('📦 正在加载题库数据...');
  let questions;
  try {
    // Try same origin first, fallback to GitHub
    let resp = await fetch('/econ-import.json');
    if (!resp.ok) resp = await fetch('https://raw.githubusercontent.com/zzl-cell/zkaoyan/master/frontend/econ-import.json');
    const data = await resp.json();
    questions = data.questions;
    log(`✅ 已加载 ${questions.length} 道题目`);
  } catch(e) {
    log('❌ 加载失败: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '🚀 重试';
    return;
  }

  // Step 3: Import in batches
  const batchSize = 20;
  let success = 0, failed = 0;

  for (let i = 0; i < questions.length; i += batchSize) {
    const batch = questions.slice(i, i + batchSize);
    const pct = Math.min(100, Math.round(((i + batchSize) / questions.length) * 100));

    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('status').textContent = `进度: ${Math.min(i+batchSize, questions.length)}/${questions.length} (${pct}%)`;

    try {
      const resp = await fetch(`${API}/questions_batch_import`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ questions: batch })
      });
      const result = await resp.json();
      if (result.code === 200) {
        success += batch.length;
        log(`✅ 第 ${Math.floor(i/batchSize)+1} 批：${batch.length} 题`);
      } else {
        failed += batch.length;
        log(`❌ 第 ${Math.floor(i/batchSize)+1} 批失败：${result.message}`, 'err');
      }
    } catch(e) {
      failed += batch.length;
      log(`❌ 请求失败：${e.message}`, 'err');
    }

    await new Promise(r => setTimeout(r, 150));
  }

  // Done
  document.getElementById('bar').style.width = '100%';
  log('\n' + '='.repeat(40));
  log(`📊 导入完成：成功 ${success} 题，失败 ${failed} 题`);

  if (failed === 0) {
    log('🎉 全部导入成功！', 'ok');
    btn.textContent = '✅ 完成';
    btn.style.background = '#07c160';
  } else {
    btn.textContent = '⚠️ 部分失败';
  }
}
</script>
</body>
</html>
