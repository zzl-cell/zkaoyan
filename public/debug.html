<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Z考研 - 诊断工具</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 18px; }
    .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #1989fa; color: #fff; }
    .log { background: #f5f5f5; padding: 12px; border-radius: 8px; font-size: 12px; max-height: 400px; overflow-y: auto; margin-top: 16px; }
    .ok { color: #07c160; }
    .err { color: #ee0a24; }
    .warn { color: #ff9800; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Z考研 诊断工具</h1>
    <p>点击按钮检查各项功能是否正常</p>
    <button class="btn btn-primary" onclick="runDiag()">开始诊断</button>
    <div class="log" id="log"></div>
  </div>
<script>
function log(msg, cls='') {
  const d = document.createElement('p');
  d.className = cls;
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
}

async function runDiag() {
  document.getElementById('log').innerHTML = '';
  const token = localStorage.getItem('zky_token');

  // 1. Check login
  log('1️⃣ 检查登录状态...');
  if (!token) {
    log('❌ 未登录！请先登录', 'err');
    return;
  }
  log('✅ 已登录，Token: ' + token.substring(0, 20) + '...', 'ok');

  // 2. Check API
  log('\n2️⃣ 检查 API 连接...');
  try {
    const resp = await fetch('/api/v1/user/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (data.code === 200) {
      log('✅ API 正常，用户: ' + (data.data?.nickname || '未知'), 'ok');
    } else {
      log('⚠️ API 返回: ' + data.message, 'warn');
    }
  } catch(e) {
    log('❌ API 请求失败: ' + e.message, 'err');
  }

  // 3. Check shop/user/assets
  log('\n3️⃣ 检查资料库 API...');
  try {
    const resp = await fetch('/api/v1/shop/user/assets', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (data.code === 200) {
      const items = data.data?.items || data.data?.list || [];
      log('✅ 资料库 API 正常，共 ' + items.length + ' 项', 'ok');
      if (items.length > 0) {
        log('   第一项: ' + JSON.stringify(items[0]).substring(0, 100), '');
      }
    } else {
      log('⚠️ 资料库 API: ' + data.message, 'warn');
    }
  } catch(e) {
    log('❌ 资料库 API 失败: ' + e.message, 'err');
  }

  // 4. Check practice/questions
  log('\n4️⃣ 检查题库 API...');
  try {
    const resp = await fetch('/api/v1/practice/questions?page=1&pageSize=5', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (data.code === 200) {
      log('✅ 题库 API 正常，共 ' + (data.data?.total || 0) + ' 题', 'ok');
    } else {
      log('⚠️ 题库 API: ' + data.message, 'warn');
    }
  } catch(e) {
    log('❌ 题库 API 失败: ' + e.message, 'err');
  }

  // 5. Check admin access
  log('\n5️⃣ 检查管理员权限...');
  try {
    const resp = await fetch('/api/v1/admin/dashboard', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    if (data.code === 200) {
      log('✅ 管理后台可访问', 'ok');
    } else {
      log('⚠️ 管理后台: ' + data.message, 'warn');
    }
  } catch(e) {
    log('❌ 管理后台失败: ' + e.message, 'err');
  }

  log('\n=============================');
  log('诊断完成！如果看到 ❌，说明该项有问题');
}
</script>
</body>
</html>
