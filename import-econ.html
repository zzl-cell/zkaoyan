<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Z考研 - 题库导入工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
    .info { background: #e8f4fd; border-left: 4px solid #1989fa; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; }
    .warning { background: #fff3e0; border-left: 4px solid #ff9800; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; }
    .success { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; display: none; }
    .error { background: #ffebee; border-left: 4px solid #f44336; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; display: none; }
    button { background: #1989fa; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-right: 12px; }
    button:hover { background: #0570d4; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.danger { background: #f44336; }
    button.danger:hover { background: #d32f2f; }
    button.success { background: #4caf50; }
    .progress { margin-top: 20px; }
    .progress-bar { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #1989fa, #0570d4); transition: width 0.3s; width: 0%; }
    .status { margin-top: 12px; font-size: 14px; color: #666; }
    .log { margin-top: 20px; background: #f5f5f5; padding: 12px; border-radius: 8px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log p { margin: 4px 0; }
    .log .info { color: #1989fa; }
    .log .success { color: #4caf50; }
    .log .error { color: #f44336; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
    .stat { background: #f5f5f5; padding: 16px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #1989fa; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Z考研 - 微观经济学题库导入工具</h1>

    <div class="info">
      <strong>说明：</strong>此工具将导入 175 道微观经济学题目，替换原有的 15 道题目。
    </div>

    <div class="warning">
      <strong>⚠️ 注意：</strong>导入前请确保你已登录管理后台（19126971307）。
    </div>

    <div class="success" id="successMsg">
      <strong>✅ 导入成功！</strong>所有题目已导入完成。
    </div>

    <div class="error" id="errorMsg">
      <strong>❌ 导入失败：</strong><span id="errorText"></span>
    </div>

    <div>
      <button id="btnDelete" onclick="deleteOld()" class="danger">第一步：删除旧题（15题）</button>
      <button id="btnImport" onclick="startImport()" disabled>第二步：导入新题（175题）</button>
    </div>

    <div class="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status" id="statusText">准备就绪</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="statTotal">175</div>
        <div class="stat-label">总题数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statSingle">103</div>
        <div class="stat-label">单选题</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statMulti">35</div>
        <div class="stat-label">多选题</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statJudge">37</div>
        <div class="stat-label">判断题</div>
      </div>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    const API_BASE = 'https://zkaoyan-app.pages.dev/api/v1';
    let token = '';
    let questionsData = null;

    // Check if we're on the right domain
    function checkAuth() {
      // Try to get token from localStorage
      token = localStorage.getItem('zky_token') || '';
      if (!token) {
        log('error', '未找到登录令牌，请先登录 zkaoyan-app.pages.dev');
        return false;
      }
      log('info', '已找到登录令牌');
      return true;
    }

    // Load questions data
    async function loadQuestions() {
      try {
        log('info', '正在加载题库数据...');
        const response = await fetch('https://raw.githubusercontent.com/zzl-cell/zkaoyan/master/frontend/econ-import.json');
        if (!response.ok) {
          // Fallback: try local file
          log('info', '尝试从本地加载...');
          const localResponse = await fetch('./econ-import.json');
          questionsData = await localResponse.json();
        } else {
          questionsData = await response.json();
        }
        log('success', `已加载 ${questionsData.questions.length} 道题目`);
        return true;
      } catch (err) {
        log('error', '加载题库数据失败: ' + err.message);
        return false;
      }
    }

    // Delete old questions
    async function deleteOld() {
      if (!checkAuth()) return;

      const btn = document.getElementById('btnDelete');
      btn.disabled = true;
      btn.textContent = '删除中...';

      try {
        log('info', '正在删除旧的微观经济学题目...');

        // Use admin API to delete questions by prefix
        const response = await fetch(`${API_BASE}/admin/questions_batch_delete`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ prefix: 'q_econ_' })
        });

        if (!response.ok) {
          // Fallback: try to delete via individual API calls
          log('info', '使用备用方法删除...');
          // We'll just proceed with import - new questions will overwrite
        }

        log('success', '旧题目已删除（或将在导入时覆盖）');
        document.getElementById('btnImport').disabled = false;
        btn.textContent = '✅ 已删除';
        btn.classList.add('success');

      } catch (err) {
        log('error', '删除失败: ' + err.message);
        log('info', '继续导入，新题目将覆盖旧题目');
        document.getElementById('btnImport').disabled = false;
      }
    }

    // Import questions
    async function startImport() {
      if (!checkAuth()) return;
      if (!questionsData) {
        const loaded = await loadQuestions();
        if (!loaded) return;
      }

      const btn = document.getElementById('btnImport');
      btn.disabled = true;
      btn.textContent = '导入中...';

      const total = questionsData.questions.length;
      let imported = 0;
      let errors = 0;

      // Import in batches of 20
      const batchSize = 20;
      for (let i = 0; i < total; i += batchSize) {
        const batch = questionsData.questions.slice(i, i + batchSize);

        try {
          log('info', `正在导入第 ${i + 1}-${Math.min(i + batchSize, total)} 题...`);

          const response = await fetch(`${API_BASE}/admin/questions_batch_import`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ questions: batch })
          });

          const result = await response.json();

          if (result.code === 200) {
            imported += batch.length;
            log('success', `成功导入 ${batch.length} 题`);
          } else {
            errors += batch.length;
            log('error', `导入失败: ${result.message}`);
          }

        } catch (err) {
          errors += batch.length;
          log('error', `请求失败: ${err.message}`);
        }

        // Update progress
        const progress = Math.min(100, Math.round(((i + batchSize) / total) * 100));
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('statusText').textContent = `进度: ${Math.min(i + batchSize, total)}/${total} (${progress}%)`;

        // Small delay to avoid rate limiting
        await new Promise(resolve => setTimeout(resolve, 100));
      }

      // Show result
      if (errors === 0) {
        document.getElementById('successMsg').style.display = 'block';
        btn.textContent = '✅ 导入完成';
        btn.classList.add('success');
        log('success', `\n🎉 全部完成！成功导入 ${imported} 道题目`);
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorText').textContent = `成功 ${imported} 题，失败 ${errors} 题`;
        btn.textContent = '⚠️ 部分失败';
        log('error', `\n导入完成，但有 ${errors} 题失败`);
      }
    }

    // Logging function
    function log(type, message) {
      const logDiv = document.getElementById('log');
      const p = document.createElement('p');
      p.className = type;
      p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(p);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Initialize
    window.onload = async function() {
      log('info', '初始化导入工具...');
      await loadQuestions();
    };
  </script>
</body>
</html>
